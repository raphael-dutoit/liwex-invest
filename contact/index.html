<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact | Corner Group</title>
<meta name="description" content="Contactez Corner Group pour échanger sur votre projet immobilier : investissement, transaction, rénovation, construction ou marchand de biens." />
<link rel="canonical" href="https://cornergroup.com/contact/" />
<meta property="og:title" content="Contact | Corner Group" />
<meta property="og:description" content="Parlons de votre projet immobilier." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://cornergroup.com/contact/" />
<meta property="og:image" content="/assets/img/og-cover.jpg" />
<meta name="robots" content="index, follow" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { bronze: '#a9784c', 'bronze-dark': '#8b6239', anthracite: '#23262b', pierre: '#a8a6a0', 'pierre-light': '#f4f3f1' },
      fontFamily: { sans: ['Inter', 'sans-serif'], display: ['GalanoGrotesque', 'Inter', 'sans-serif'] },
    }},
  };
</script>
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="font-sans antialiased" data-header-mode="solid">
<a href="#main" class="skip-link">Aller au contenu</a>
<header id="site-header" class="fixed top-0 inset-x-0 z-50"></header>

<main id="main">

  <section class="pt-40 lg:pt-48 pb-20 lg:pb-24">
    <div class="max-w-7xl mx-auto px-6 lg:px-10">
      <p class="fade-in-up text-bronze text-xs tracking-[0.2em] uppercase mb-5">Contact</p>
      <h1 class="fade-in-up delay-1 font-display text-4xl lg:text-6xl leading-tight max-w-2xl">Parlons de votre projet.</h1>
    </div>
  </section>

  <section class="pb-28 lg:pb-40">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 grid grid-cols-1 lg:grid-cols-12 gap-16">

      <div class="lg:col-span-4 fade-in-up">
        <p class="text-lg text-stone-600 leading-relaxed mb-10">
          Que vous soyez investisseur, partenaire, porteur de projet ou futur collaborateur, notre équipe vous répond dans les meilleurs délais.
        </p>
        <div class="border-t border-stone-200 pt-8">
          <p class="text-xs tracking-[0.15em] uppercase text-stone-400 mb-3">Email</p>
          <a href="mailto:wilfried@cornerimmo.fr" class="font-display text-xl text-anthracite hover:text-bronze transition-colors">wilfried@cornerimmo.fr</a>
        </div>
      </div>

      <div class="lg:col-span-7 lg:col-start-6 fade-in-up delay-1">
        <!--
          Formulaire statique — à connecter à un service de traitement (Netlify Forms,
          Formspree, ou une fonction serverless) selon la plateforme d'hébergement retenue.
          Aucune donnée n'est stockée côté serveur par ce gabarit HTML.
          Protection anti-spam recommandée : Cloudflare Turnstile ou hCaptcha
          (ajouter le widget avant le bouton d'envoi, avec la clé de site fournie par le service choisi).
        -->
        <form
          id="contact-form"
          name="contact"
          method="POST"
          action="#"
          class="space-y-6"
        >
          <!-- Honeypot anti-spam -->
          <div class="hidden" aria-hidden="true">
            <label>Ne pas remplir<input type="text" name="company_website" tabindex="-1" autocomplete="off" /></label>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label for="nom" class="block text-xs tracking-[0.1em] uppercase text-stone-500 mb-2">Nom</label>
              <input type="text" id="nom" name="nom" required class="w-full border-0 border-b border-stone-300 focus:border-bronze bg-transparent py-3 text-base outline-none transition-colors" />
            </div>
            <div>
              <label for="entreprise" class="block text-xs tracking-[0.1em] uppercase text-stone-500 mb-2">Entreprise</label>
              <input type="text" id="entreprise" name="entreprise" class="w-full border-0 border-b border-stone-300 focus:border-bronze bg-transparent py-3 text-base outline-none transition-colors" />
            </div>
          </div>

          <div>
            <label for="email" class="block text-xs tracking-[0.1em] uppercase text-stone-500 mb-2">Email</label>
            <input type="email" id="email" name="email" required class="w-full border-0 border-b border-stone-300 focus:border-bronze bg-transparent py-3 text-base outline-none transition-colors" />
          </div>

          <div>
            <label for="message" class="block text-xs tracking-[0.1em] uppercase text-stone-500 mb-2">Message</label>
            <textarea id="message" name="message" rows="5" required class="w-full border-0 border-b border-stone-300 focus:border-bronze bg-transparent py-3 text-base outline-none transition-colors resize-none"></textarea>
          </div>

          <!-- Emplacement du widget Cloudflare Turnstile / hCaptcha -->
          <div id="captcha-widget"></div>

          <button type="submit" class="inline-flex items-center gap-3 bg-anthracite text-white px-8 py-4 text-sm tracking-wide rounded-full hover:bg-bronze transition-colors">
            Envoyer
            <span aria-hidden="true">→</span>
          </button>

          <p id="form-status" class="text-sm text-stone-500 hidden" role="status"></p>
        </form>
      </div>
    </div>
  </section>

</main>

<footer id="site-footer" class="bg-anthracite text-white"></footer>
<script src="/assets/js/site.js"></script>
<script>
  // Envoi via le client mail du visiteur (site statique) — objet « Contact Corner Group ».
  document.getElementById('contact-form')?.addEventListener('submit', function (e) {
    e.preventDefault();
    // Honeypot anti-spam : si rempli, on ignore silencieusement.
    if (this.querySelector('[name="company_website"]')?.value) return;
    const val = (id) => (document.getElementById(id)?.value || '').trim();
    const corps =
      'Nom : ' + val('nom') + '\n' +
      'Entreprise : ' + val('entreprise') + '\n' +
      'Email : ' + val('email') + '\n\n' +
      val('message');
    const lien = 'mailto:wilfried@cornerimmo.fr'
      + '?subject=' + encodeURIComponent('Contact Corner Group')
      + '&body=' + encodeURIComponent(corps);
    window.location.href = lien;
    const status = document.getElementById('form-status');
    if (status) {
      status.textContent = "Votre logiciel de messagerie va s'ouvrir avec votre message pré-rempli. Si rien ne se passe, écrivez-nous directement à wilfried@cornerimmo.fr.";
      status.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
